name: Welcome New Issue

on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: read

jobs:
  welcome-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Welcome issue creator
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `👋 Thank you @${context.payload.issue.user.login} for opening this issue!

              We appreciate you taking the time to report or suggest an improvement for **Pollution Control Hub**.

              Our maintainers will review your issue as soon as possible.

              Meanwhile, please ensure:
              - 📌 The issue clearly describes the problem or feature request.
              - 📝 Steps to reproduce (if it's a bug) are included.
              - 📷 Screenshots or logs are attached when applicable.
              - 🔍 The issue is not a duplicate of an existing one.

              Thank you for contributing to the project! 🚀`
            });
